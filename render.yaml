services:
  - type: web
    name: shl-assessment-agent
    runtime: python
    repo: https://github.com/YOUR_USERNAME/shl-assessment-agent
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
    healthCheckPath: /health
    autoDeploy: true